{% extends 'store/base.html' %}
{% block content %}
<div class="text-center py-5">
    <div class="mb-4">
        <i class="bi bi-check-circle-fill text-success" style="font-size:5rem;"></i>
    </div>
    <h2 class="fw-bold">Order Placed Successfully!</h2>
    <p class="text-muted">Thank you for your purchase. We'll process your order shortly.</p>
    <div class="d-flex justify-content-center gap-3 mt-4">
        <a href="{% url 'product_list' %}" class="btn btn-dark btn-lg">Continue Shopping</a>
        {% if user.is_authenticated %}
        <a href="{% url 'profile' %}" class="btn btn-outline-dark btn-lg">View My Orders</a>
        {% endif %}
    </div>
</div>
{% endblock %}
