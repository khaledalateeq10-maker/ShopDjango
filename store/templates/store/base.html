<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopDjango</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-size: 1.5rem; }
        .card:hover { transform: translateY(-5px); transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">🛒 ShopDjango</a>
        <form class="d-flex mx-auto w-50" method="get" action="{% url 'product_list' %}">
            <input class="form-control me-2" type="search" name="q" placeholder="Search products...">
            <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
        <div class="d-flex gap-2">
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-person"></i> {{ user.username }}
                </a>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                <a href="{% url 'register' %}" class="btn btn-light btn-sm">Register</a>
            {% endif %}
            <a href="{% url 'cart' %}" class="btn btn-warning btn-sm">
                <i class="bi bi-cart"></i> Cart
            </a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 ShopDjango. All rights reserved.</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
